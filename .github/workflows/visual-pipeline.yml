name: Visual Release Pipeline

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  prep:
    name: Build Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            Lewis/package-lock.json

      - name: Install Root Test Runner
        run: npm ci --no-audit --no-fund

      - name: Install App Dependencies
        run: npm --prefix Lewis ci --no-audit --no-fund

      - name: Lint App
        run: npm --prefix Lewis run lint

      - name: Build App
        run: npm --prefix Lewis run build

  smoke:
    name: Smoke Gate
    runs-on: ubuntu-latest
    needs: prep
    timeout-minutes: 30
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Root Test Runner
        run: npm ci --no-audit --no-fund

      - name: Install App Dependencies
        run: npm --prefix Lewis ci --no-audit --no-fund

      - name: Run Smoke Pipeline
        run: npm run ci:smoke

      - name: Upload Smoke Evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-smoke-evidence
          path: |
            cypress/screenshots/**
            cypress/videos/**
          if-no-files-found: ignore

  regression:
    name: Regression Gate
    runs-on: ubuntu-latest
    needs: smoke
    timeout-minutes: 45
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Root Test Runner
        run: npm ci --no-audit --no-fund

      - name: Install App Dependencies
        run: npm --prefix Lewis ci --no-audit --no-fund

      - name: Run Regression Pipeline
        run: npm run ci:regression

      - name: Upload Regression Evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-regression-evidence
          path: |
            cypress/screenshots/**
            cypress/videos/**
          if-no-files-found: ignore

  signoff:
    name: Release Signoff
    runs-on: ubuntu-latest
    needs: regression
    steps:
      - name: Confirm Pipeline Completion
        run: echo "Visual release pipeline completed after smoke and regression gates passed."