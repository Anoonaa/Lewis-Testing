name: Visual Smoke Pipeline

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  prep:
    name: Build Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            Lewis/package-lock.json

      - name: Install Root Test Runner
        run: npm ci --no-audit --no-fund

      - name: Install App Dependencies
        run: npm --prefix Lewis ci --no-audit --no-fund

      - name: Lint App
        run: npm --prefix Lewis run lint

      - name: Build App
        run: npm --prefix Lewis run build

  delivery-quote:
    name: Smoke Gate - Delivery Quote
    runs-on: ubuntu-latest
    needs: prep
    timeout-minutes: 25
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Root Test Runner
        run: npm ci --no-audit --no-fund

      - name: Install App Dependencies
        run: npm --prefix Lewis ci --no-audit --no-fund

      - name: Run Delivery Quote Smoke Test
        run: npm run ci:smoke:delivery

      - name: Upload Delivery Evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-delivery-evidence
          path: |
            cypress/screenshots/**
            cypress/videos/**
          if-no-files-found: ignore

  checkout-chain:
    name: Smoke Gate - Checkout Chain
    runs-on: ubuntu-latest
    needs: delivery-quote
    timeout-minutes: 25
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Root Test Runner
        run: npm ci --no-audit --no-fund

      - name: Install App Dependencies
        run: npm --prefix Lewis ci --no-audit --no-fund

      - name: Run Checkout Smoke Test
        run: npm run ci:smoke:checkout

      - name: Upload Checkout Evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-checkout-evidence
          path: |
            cypress/screenshots/**
            cypress/videos/**
          if-no-files-found: ignore