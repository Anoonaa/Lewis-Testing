name: Visual Legacy Pipeline

on:
  workflow_dispatch:

jobs:
  prep:
    name: Build Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            Lewis/package-lock.json

      - name: Install Root Test Runner
        run: npm ci --no-audit --no-fund

      - name: Install App Dependencies
        run: npm --prefix Lewis ci --no-audit --no-fund

      - name: Build App
        run: npm --prefix Lewis run build

  day1-sanity:
    name: Legacy Gate - Day 1 Sanity
    runs-on: ubuntu-latest
    needs: prep
    timeout-minutes: 20
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Root Test Runner
        run: npm ci --no-audit --no-fund

      - name: Install App Dependencies
        run: npm --prefix Lewis ci --no-audit --no-fund

      - name: Run Day 1 Sanity Test
        run: npm run ci:legacy:todo

      - name: Upload Day 1 Evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: legacy-day1-evidence
          path: |
            cypress/screenshots/**
            cypress/videos/**
          if-no-files-found: ignore

  hidden-network:
    name: Legacy Gate - Hidden Network Suite
    runs-on: ubuntu-latest
    needs: day1-sanity
    timeout-minutes: 20
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Root Test Runner
        run: npm ci --no-audit --no-fund

      - name: Install App Dependencies
        run: npm --prefix Lewis ci --no-audit --no-fund

      - name: Run Hidden Network Test
        run: npm run ci:legacy:network

      - name: Upload Hidden Network Evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: legacy-network-evidence
          path: |
            cypress/screenshots/**
            cypress/videos/**
          if-no-files-found: ignore

  