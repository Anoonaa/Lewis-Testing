name: Classroom CI/CD Demo

on:
  # Allows  to manually trigger the pipeline with a button click
  workflow_dispatch:
  # Triggers automatically when anyone pushes code
  push:
    branches: [ main, master ]

jobs:
  # JOB 1: Demonstrates a successful automation step
  passing-job:
    name: Core Logic Verification
    runs-on: ubuntu-latest
    steps:
      - name: Stage 1 - Code Checkout 
        run: echo "📦 pulling the source code from GitHub repository..."

      - name: Stage 2 - Running Static Quality Checks
        run: |
          echo "🔍 Analyzing syntax structure..."
          echo "✅ No syntax errors found."

      - name: Stage 3 - verifying Quality Engineering Tests
        # The 'exit 0' command explicitly tells GitHub this step succeeded
        run: |
          echo "🧪 Running Unit and Integration Tests..."
          echo "Test 1: User Authentication Flow -> PASSED"
          echo "Test 2: Database Connection Pool -> PASSED"
          exit 0

  